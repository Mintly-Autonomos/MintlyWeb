<div
  class="modal-backdrop"
  tabindex="0"
  (click)="onBackdropClick($event)"
  (keydown)="onBackdropKeydown($event)"
>
  <mat-card class="modal-panel" [ngClass]="[status, sizeClass]">
    <mat-card-header class="modal-header">
      <div class="modal-header-title">
        <div class="modal-title-wrapper">
          <span class="modal-status" *ngIf="statusIcon">{{ statusIcon }}</span>
          <mat-card-title class="modal-title">{{ title }}</mat-card-title>
        </div>
      </div>
    </mat-card-header>

    <div class="validation-banner" *ngIf="sizeError">{{ sizeError }}</div>

    <mat-card-content class="modal-body">
      <p class="message-text" *ngIf="message; else projectedContent">{{ message }}</p>
      <ng-template #projectedContent>
        <ng-content></ng-content>
      </ng-template>
    </mat-card-content>

    <div class="modal-footer" *ngIf="!hideClose">
      <button mat-flat-button color="primary" type="button" (click)="onClose()">
        {{ closeLabel }}
      </button>
    </div>
  </mat-card>
</div>
